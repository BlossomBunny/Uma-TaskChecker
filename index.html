<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { background: #EEDCC3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #game-container { border: 8px solid #4C566A; border-radius: 15px; background: white; width: 200px; height: 200px; }
        #ui { margin-top: 20px; background: white; padding: 20px; border-radius: 15px; width: 250px; }
        .item { margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="ui">
        <div class="item"><input type="checkbox" onclick="react()"> Brush Teeth</div>
        <div class="item"><input type="checkbox" onclick="react()"> Drink Water</div>
        <div class="item"><input type="checkbox" onclick="react()"> Tidy Desk</div>
    </div>

<script>
    const config = {
        type: Phaser.AUTO, width: 200, height: 200, parent: 'game-container',
        scene: { preload: preload, create: create }
    };
    const game = new Phaser.Game(config);

    function preload() {
   
    this.load.atlas('agnes', 'agnes-sprites.png', 'agnes-sprites-json.json');
}

    function create() {
        this.agnes = this.add.sprite(100, 100, 'agnes', 'agtc001A_00.png');
        this.agnes.setScale(1.5);

        this.anims.create({
            key: 'idle',
            frames: this.anims.generateFrameNames('agnes', { prefix: 'agtc001A_00', suffix: '.png', start: 0, end: 2 }),
            frameRate: 3, repeat: -1
        });
        this.agnes.play('idle');
    }

    function react() {
        const agnes = game.scene.scenes[0].agnes;
        agnes.setFrame('agtc950_04.png');
        setTimeout(() => agnes.play('idle'), 1000);
    }
</script>
</body>
</html>
