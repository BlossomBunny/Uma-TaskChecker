<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { background: #EEDCC3; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #game-container { border: 8px solid #4C566A; border-radius: 15px; background: white; width: 200px; height: 200px; overflow: hidden; }
        #ui { margin-top: 20px; background: white; padding: 20px; border-radius: 15px; width: 250px; text-align: center; }
        .btn { margin: 5px; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container"></div>
    
    <div id="ui">
        <button class="btn" onclick="agnes.play('walk_left')">Walk</button>
        <button class="btn" onclick="agnes.play('dash_left')">Dash</button>
        <button class="btn" onclick="agnes.play('sit_down')">Sit</button>
        <button class="btn" onclick="agnes.play('idle')">Idle</button>
    </div>

<script>
    let agnes; 

    const config = {
        type: Phaser.AUTO, width: 200, height: 200, parent: 'game-container',
        scene: { preload: preload, create: create }
    };
    const game = new Phaser.Game(config);

    function preload() {
        this.load.atlas('agnes', 'agnes-sprites.png', 'agnes-sprites-json.json');
    }

    function create() {
        agnes = this.add.sprite(100, 100, 'agnes', 'agtc001A_00.png');
        agnes.setScale(1.5);

        // 1. Idle
        this.anims.create({
            key: 'idle',
            frames: [
                { key: 'agnes', frame: 'agtc001A_00.png' }, { key: 'agnes', frame: 'agtc001A_01.png' }, { key: 'agnes', frame: 'agtc001A_02.png' }
            ],
            frameRate: 3, repeat: -1
        });

        // 2. Walk Left
        this.anims.create({
            key: 'walk_left',
            frames: [
                { key: 'agnes', frame: 'agtc101_00.png' }, { key: 'agnes', frame: 'agtc101_01.png' }, { key: 'agnes', frame: 'agtc101_02.png' },
                { key: 'agnes', frame: 'agtc101_03.png' }, { key: 'agnes', frame: 'agtc101_04.png' }, { key: 'agnes', frame: 'agtc101_05.png' }
            ],
            frameRate: 6, repeat: -1
        });

        // 3. Dash Left
        this.anims.create({
            key: 'dash_left',
            frames: [
                { key: 'agnes', frame: 'agtc102_00.png' }, { key: 'agnes', frame: 'agtc102_01.png' }, { key: 'agnes', frame: 'agtc102_02.png' },
                { key: 'agnes', frame: 'agtc102_03.png' }, { key: 'agnes', frame: 'agtc102_04.png' }, { key: 'agnes', frame: 'agtc102_05.png' }
            ],
            frameRate: 10, repeat: -1
        });

        // 4. Mid-Dash
        this.anims.create({
            key: 'mid_dash',
            frames: [
                { key: 'agnes', frame: 'agtc110_00.png' }, { key: 'agnes', frame: 'agtc110_01.png' },
                { key: 'agnes', frame: 'agtc111_00.png' }, { key: 'agnes', frame: 'agtc111_01.png' }, { key: 'agnes', frame: 'agtc111_02.png' },
                { key: 'agnes', frame: 'agtc111_03.png' }, { key: 'agnes', frame: 'agtc111_04.png' }, { key: 'agnes', frame: 'agtc111_05.png' }, { key: 'agnes', frame: 'agtc111_06.png' }
            ],
            frameRate: 8, repeat: -1
        });

        // 5. Sudden Stop
        this.anims.create({
            key: 'stop',
            frames: [
                { key: 'agnes', frame: 'agtc120_00.png' }, { key: 'agnes', frame: 'agtc120_01.png' }, { key: 'agnes', frame: 'agtc120_01.png' }, { key: 'agnes', frame: 'agtc121_00.png' }
            ],
            frameRate: 4, repeat: 0
        });

        // 6. Sit Down (Transition)
        this.anims.create({
            key: 'sit_down',
            frames: [
                { key: 'agnes', frame: 'agtc320_00.png' }, { key: 'agnes', frame: 'agtc320_01.png' },
                { key: 'agnes', frame: 'agtc320_02.png' }, { key: 'agnes', frame: 'agtc320_03.png' },
                { key: 'agnes', frame: 'agtc320_04.png' }, { key: 'agnes', frame: 'agtc320_05.png' },
                { key: 'agnes', frame: 'agtc320_06.png' }
            ],
            frameRate: 6, repeat: 0
        });

        // 7. Sitting Loop
        this.anims.create({
            key: 'sitting_loop',
            frames: [
                { key: 'agnes', frame: 'agtc320_04.png' }, 
                { key: 'agnes', frame: 'agtc320_06.png' }
            ],
            frameRate: 2, repeat: -1
        });

        // Logic: Switch to loop when sit_down finishes
        agnes.on('animationcomplete', (animation) => {
            if (animation.key === 'sit_down') {
                agnes.play('sitting_loop');
            }
        });

        agnes.play('idle');
    }
</script>
</body>
</html>
