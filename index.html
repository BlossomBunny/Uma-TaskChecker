<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { background: #EEDCC3; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        #game-container { border: 8px solid #4C566A; border-radius: 15px; background: white; width: 200px; height: 200px; overflow: hidden; }
        
        /* Stats HUD */
        #hud { display: flex; justify-content: space-around; width: 300px; background: #fff; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 12px; }
        
        /* Task Sections */
        #ui { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 300px; }
        .category { background: white; padding: 10px; border-radius: 10px; }
        .btn { display: block; width: 100%; margin: 5px 0; padding: 5px; cursor: pointer; background: #eee; border: none; border-radius: 5px; }
        .btn:hover { background: #ddd; }
    </style>
</head>
<body>

    <div id="hud">
        <div>Pwr: <span id="stat-power">0</span></div>
        <div>Stm: <span id="stat-stamina">0</span></div>
        <div>Gts: <span id="stat-guts">0</span></div>
        <div>Wit: <span id="stat-wit">0</span></div>
    </div>

    <div id="game-container"></div>
    
    <div id="ui">
        <div class="category">
            <strong>Power</strong>
            <button class="btn" onclick="doTask('power', 'dash_left')">Cook/Hydrate</button>
        </div>
        <div class="category">
            <strong>Stamina</strong>
            <button class="btn" onclick="doTask('stamina', 'walk_left')">Chores/Walk</button>
        </div>
        <div class="category">
            <strong>Guts</strong>
            <button class="btn" onclick="doTask('guts', 'sit_down')">Hygiene</button>
        </div>
        <div class="category">
            <strong>Wit</strong>
            <button class="btn" onclick="doTask('wit', 'idle')">Study</button>
        </div>
    </div>

<script>
    let agnes;
    // Load Stats from storage
    let stats = JSON.parse(localStorage.getItem('agnesStats')) || { power: 0, stamina: 0, guts: 0, wit: 0 };

    const config = { type: Phaser.AUTO, width: 200, height: 200, parent: 'game-container', scene: { preload: preload, create: create } };
    const game = new Phaser.Game(config);

    function updateHud() {
        document.getElementById('stat-power').innerText = stats.power;
        document.getElementById('stat-stamina').innerText = stats.stamina;
        document.getElementById('stat-guts').innerText = stats.guts;
        document.getElementById('stat-wit').innerText = stats.wit;
    }

    function doTask(type, anim) {
        // Boost stat
        stats[type] += 10;
        localStorage.setItem('agnesStats', JSON.stringify(stats));
        updateHud();
        
        // Play animation
        agnes.play(anim);
    }

    function preload() { this.load.atlas('agnes', 'agnes-sprites.png', 'agnes-sprites-json.json'); }

    function create() {
        agnes = this.add.sprite(100, 100, 'agnes', 'agtc001A_00.png').setScale(1.5);

        // 1. Idle
        this.anims.create({
            key: 'idle',
            frames: [
                { key: 'agnes', frame: 'agtc001A_00.png' }, { key: 'agnes', frame: 'agtc001A_01.png' }, { key: 'agnes', frame: 'agtc001A_02.png' }
            ],
            frameRate: 3, repeat: -1
        });

        // 2. Walk Left
        this.anims.create({
            key: 'walk_left',
            frames: [
                { key: 'agnes', frame: 'agtc101_00.png' }, { key: 'agnes', frame: 'agtc101_01.png' }, { key: 'agnes', frame: 'agtc101_02.png' },
                { key: 'agnes', frame: 'agtc101_03.png' }, { key: 'agnes', frame: 'agtc101_04.png' }, { key: 'agnes', frame: 'agtc101_05.png' }
            ],
            frameRate: 6, repeat: -1
        });

        // 3. Dash Left
        this.anims.create({
            key: 'dash_left',
            frames: [
                { key: 'agnes', frame: 'agtc102_00.png' }, { key: 'agnes', frame: 'agtc102_01.png' }, { key: 'agnes', frame: 'agtc102_02.png' },
                { key: 'agnes', frame: 'agtc102_03.png' }, { key: 'agnes', frame: 'agtc102_04.png' }, { key: 'agnes', frame: 'agtc102_05.png' }
            ],
            frameRate: 10, repeat: -1
        });

        // 4. Mid-Dash
        this.anims.create({
            key: 'mid_dash',
            frames: [
                { key: 'agnes', frame: 'agtc110_00.png' }, { key: 'agnes', frame: 'agtc110_01.png' },
                { key: 'agnes', frame: 'agtc111_00.png' }, { key: 'agnes', frame: 'agtc111_01.png' }, { key: 'agnes', frame: 'agtc111_02.png' },
                { key: 'agnes', frame: 'agtc111_03.png' }, { key: 'agnes', frame: 'agtc111_04.png' }, { key: 'agnes', frame: 'agtc111_05.png' }, { key: 'agnes', frame: 'agtc111_06.png' }
            ],
            frameRate: 8, repeat: -1
        });

        // 5. Sudden Stop
        this.anims.create({
            key: 'stop',
            frames: [
                { key: 'agnes', frame: 'agtc120_00.png' }, { key: 'agnes', frame: 'agtc120_01.png' }, { key: 'agnes', frame: 'agtc120_01.png' }, { key: 'agnes', frame: 'agtc121_00.png' }
            ],
            frameRate: 4, repeat: 0
        });

        // 6. Sit Down (Transition)
        this.anims.create({
            key: 'sit_down',
            frames: [
                { key: 'agnes', frame: 'agtc320_00.png' }, { key: 'agnes', frame: 'agtc320_01.png' },
                { key: 'agnes', frame: 'agtc320_02.png' }, { key: 'agnes', frame: 'agtc320_03.png' },
                { key: 'agnes', frame: 'agtc320_04.png' }, { key: 'agnes', frame: 'agtc320_06.png' }
            ],
            frameRate: 6, repeat: 0
        });

        // 7. Sitting Loop
        this.anims.create({
            key: 'sitting_loop',
            frames: [
                { key: 'agnes', frame: 'agtc320_04.png' }, 
                { key: 'agnes', frame: 'agtc320_06.png' }
            ],
            frameRate: 2, repeat: -1
        });

        // Logic: Switch to loop when sit_down finishes
        agnes.on('animationcomplete', (animation) => {
            if (animation.key === 'sit_down') {
                agnes.play('sitting_loop');
            }
        });

    agnes.on('animationcomplete', (animation) => {
            if (animation.key !== 'idle' && animation.key !== 'sitting_loop') {
                agnes.play('idle');
            }
        });

        updateHud();
        agnes.play('idle');
    }
</script>
</body>
</html>
