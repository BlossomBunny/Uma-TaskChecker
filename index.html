<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style> body { margin: 0; background: #FFFDF0; display: flex; justify-content: center; align-items: center; height: 100vh; } </style>
</head>
<body>
    <div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO, width: 200, height: 200, parent: 'game-container',
        backgroundColor: '#FFFFFF',
        scene: { preload, create }
    };

    const game = new Phaser.Game(config);

    function preload() {
        console.log("Attempting to load: agnes-sprites.jpg");
        // Loading the atlas
        this.load.atlas('agnes', 'agnes-sprites.jpg', 'agnes-sprites.json');
        
        // This checks if the file loaded
        this.load.on('loaderror', (file) => {
            console.error("Error loading file:", file.key);
            alert("Error: Could not load " + file.key + ". Check your filenames!");
        });
    }

    function create() {
        // If the atlas loaded, this should show the first frame
        // I am using 'agtc001A_00.png' based on your file snippet
        this.agnes = this.add.sprite(100, 100, 'agnes', 'agtc001A_00.png');
        
        if (!this.agnes.texture) {
            console.error("Texture not found! The JSON might not match the image.");
            // Draw a red square to show the game IS running, even if the sprite is broken
            this.add.rectangle(100, 100, 50, 50, 0xff0000); 
        } else {
            console.log("Agnes loaded successfully!");
        }
    }
</script>
</body>
</html>
