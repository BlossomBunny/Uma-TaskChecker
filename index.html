<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        :root { --accent: #f8a5c2; --bg: #fff0f5; --bar-bg: #dfe6e9; --dismiss: #b2bec3; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; color: #596275; margin: 0; padding: 10px; box-sizing: border-box; }
        header { width: 95%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        #menu-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        #settings-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #hud, #checklist { width: 95%; max-width: 400px; background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .stat-label { width: 40px; font-weight: bold; font-size: 0.8em; }
        .bar-container { flex-grow: 1; height: 10px; background: var(--bar-bg); border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s; }
        .rank { width: 25px; font-weight: bold; font-size: 0.9em; text-align: center; color: var(--accent); }
        #agnes-wrap {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 15px;
        }
        #status-box {
            width: 364px; /* matches game-container's 360px + 2px border each side */
            background: white;
            border: 2px solid var(--accent);
            border-bottom: none;
            border-radius: 16px 16px 0 0;
            padding: 8px 12px; box-sizing: border-box;
            font-size: 0.72em; color: #596275; line-height: 1.4;
            text-align: center; min-height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        #status-text {
            transition: opacity 0.4s ease;
            opacity: 1;
        }
        #game-container {
            border: 2px solid var(--accent);
            border-radius: 0 0 24px 24px;
            border-top: none;
            box-shadow: 0 8px 20px rgba(248,165,194,0.15);
            background: #fff;
            width: 360px; height: 180px;
            overflow: hidden; cursor: pointer;
        }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .task-info { display: flex; flex-direction: column; }
        .task-name { font-weight: 600; font-size: 0.85em; }
        .task-meta { display: flex; gap: 8px; }
        .task-stat { font-size: 0.7em; color: #a5b1c2; font-weight: bold; }
        .task-time { font-size: 0.7em; color: var(--accent); font-weight: bold; }
        .btn-group { display: flex; gap: 5px; }
        .btn-check { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-dismiss { background: var(--dismiss); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.7em; }
        .btn-del { background: #ff7675; color: white; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
        #clock { font-size: 0.9em; font-weight: bold; color: #f8a5c2; margin-bottom: 5px; text-align: center; }
        .all-done { text-align: center; padding: 20px; color: var(--accent); font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<header>
    <h3>Daily Life With Uma</h3>
    <button id="menu-btn" onclick="toggleMenu()">⚙️</button>
</header>
<div id="clock">Loading time...</div>

<div id="settings-menu">
    <h3>Custom Tasks</h3>
    <input type="text" id="new-task-name" placeholder="Task Name">
    <select id="new-task-type">
        <option value="power">Power</option>
        <option value="stamina">Stamina</option>
        <option value="guts">Guts</option>
        <option value="wit">Wit</option>
    </select>
    <p>Repeat on days:</p>
    <div id="new-task-days" style="display: flex; gap: 5px; flex-wrap: wrap;">
        <label><input type="checkbox" value="0"> Sun</label>
        <label><input type="checkbox" value="1"> Mon</label>
        <label><input type="checkbox" value="2"> Tue</label>
        <label><input type="checkbox" value="3"> Wed</label>
        <label><input type="checkbox" value="4"> Thu</label>
        <label><input type="checkbox" value="5"> Fri</label>
        <label><input type="checkbox" value="6"> Sat</label>
    </div>
    <button onclick="addCustomTask()">Add Task</button>
    <hr>
    <div id="custom-task-list"></div>
    <button onclick="toggleMenu()">Close</button>
</div>

<div id="hud">
    <div class="stat-row"><div class="stat-label">Pwr</div><div class="bar-container"><div id="bar-power" class="bar-fill"></div></div><div id="rank-power" class="rank">F</div></div>
    <div class="stat-row"><div class="stat-label">Stm</div><div class="bar-container"><div id="bar-stamina" class="bar-fill"></div></div><div id="rank-stamina" class="rank">F</div></div>
    <div class="stat-row"><div class="stat-label">Gts</div><div class="bar-container"><div id="bar-guts" class="bar-fill"></div></div><div id="rank-guts" class="rank">F</div></div>
    <div class="stat-row"><div class="stat-label">Wit</div><div class="bar-container"><div id="bar-wit" class="bar-fill"></div></div><div id="rank-wit" class="rank">F</div></div>
</div>

<div id="agnes-wrap">
    <div id="status-box"><span id="status-text">Agnes is here! 🌸</span></div>
    <div id="game-container"></div>
</div>

<div id="checklist">
    <h3>Today's Schedule</h3>
    <div id="task-list"></div>
</div>

<script>
    // ── State ────────────────────────────────────────────────────────────────
    let agnes = null;
    let stats    = JSON.parse(localStorage.getItem('agnesStats'))    || { power: 0, stamina: 0, guts: 0, wit: 0 };
    let history  = JSON.parse(localStorage.getItem('agnesHistory'))  || {};
    let dismissed= JSON.parse(localStorage.getItem('agnesDismissed'))|| {};

    // Custom tasks are stored WITHOUT the check function (functions can't be JSON-serialised).
    // We restore a default check: () => true when we load them back out.
    let customTasksRaw = JSON.parse(localStorage.getItem('agnesCustomTasks')) || [];
    function hydrateCustomTasks(raw) {
        return raw.map(t => Object.assign({}, t, { check: () => true }));
    }
    let customTasks = hydrateCustomTasks(customTasksRaw);

    // ── Core Tasks ───────────────────────────────────────────────────────────
    const coreTasks = [
        { id: 'Stretch',   name: 'Morning Stretch',            type: 'power',   anim: 'cheer',      timeLabel: 'Until 10AM',  isEssential: true,  check: h => h < 10 },
        { id: 'Breakfast', name: 'Have Breakfast',             type: 'stamina', anim: 'eating',     timeLabel: 'Until 12PM',  isEssential: true,  check: h => h < 12 },
        { id: 'Water',     name: 'Drink Glass Of Water',       type: 'stamina', anim: 'snack',      timeLabel: 'Every 2hrs',  isEssential: true,  check: h => h >= 8 && h < 24 && h % 2 === 0 },
        { id: 'Lunch',     name: 'Eat Lunch',                  type: 'stamina', anim: 'eating',     timeLabel: '12PM - 3PM',  isEssential: true,  check: h => h >= 12 && h < 15 },
        { id: 'Snack',     name: 'Share A Snack With Agnes',   type: 'stamina', anim: 'snack',      timeLabel: '3PM - 5PM',   isEssential: false, check: h => h >= 15 && h < 17 },
        { id: 'Walk',      name: 'Go For A Walk with Agnes',   type: 'power',   anim: 'super_dash', timeLabel: 'After 3PM',   isEssential: false, check: h => h >= 15 && h < 19 },
        { id: 'Read',      name: 'Read/Study',                 type: 'wit',     anim: 'sit_down',   timeLabel: 'From 5PM',    isEssential: false, check: h => h >= 17 },
        { id: 'Dinner',    name: 'Have Dinner With Agnes',     type: 'stamina', anim: 'eating',     timeLabel: '6PM - 10PM',  isEssential: true,  check: h => h >= 18 && h < 22 },
        { id: 'Teeth',     name: 'Brush Your Teeth',           type: 'guts',    anim: 'giggle',     timeLabel: 'AM/PM',       isEssential: true,  check: h => (h >= 7 && h < 9) || (h >= 17 && h < 24) },
        { id: 'Tidy',      name: 'Tidy Up Room',               type: 'power',   anim: 'float',      timeLabel: 'Wed & Sun',   isEssential: false, days: [0, 3], check: h => h < 18 },
        { id: 'Tidy2',     name: 'Scrub The Bathroom',         type: 'power',   anim: 'dash',       timeLabel: 'Sun & Wed',   isEssential: false, days: [0, 3], check: h => h < 18 },
        { id: 'Shop',      name: 'Go Food Shopping With Agnes',type: 'power',   anim: 'dash',       timeLabel: 'Saturdays',   isEssential: false, days: [6],    check: h => h < 20 },
        { id: 'Laundry',   name: 'Do Laundry With Agnes',      type: 'guts',    anim: 'dash',       timeLabel: 'Sundays',     isEssential: false, days: [0],    check: h => h < 18 }
    ];

    // ── Menu ─────────────────────────────────────────────────────────────────
    function toggleMenu() {
        const menu = document.getElementById('settings-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        renderCustomTasks();
    }

    function addCustomTask() {
        const name = document.getElementById('new-task-name').value.trim();
        const type = document.getElementById('new-task-type').value;
        const dayCheckboxes = document.querySelectorAll('#new-task-days input:checked');
        const days = Array.from(dayCheckboxes).map(cb => parseInt(cb.value));

        if (!name || days.length === 0) {
            alert("Please provide a name and select at least one day.");
            return;
        }

        const raw = { id: 'custom_' + Date.now(), name, type, days, timeLabel: 'Anytime', isEssential: false };
        customTasksRaw.push(raw);
        customTasks = hydrateCustomTasks(customTasksRaw);
        localStorage.setItem('agnesCustomTasks', JSON.stringify(customTasksRaw));

        document.getElementById('new-task-name').value = '';
        dayCheckboxes.forEach(cb => cb.checked = false);
        renderCustomTasks();
        updateUI();
    }

    function deleteCustomTask(id) {
        customTasksRaw = customTasksRaw.filter(t => t.id !== id);
        customTasks    = hydrateCustomTasks(customTasksRaw);
        localStorage.setItem('agnesCustomTasks', JSON.stringify(customTasksRaw));
        renderCustomTasks();
        updateUI();
    }

    function renderCustomTasks() {
        const list = document.getElementById('custom-task-list');
        list.innerHTML = '';
        customTasksRaw.forEach(t => {
            list.innerHTML += `<div class="task-item">${t.name} <button class="btn-del" onclick="deleteCustomTask('${t.id}')">Delete</button></div>`;
        });
    }

    // ── UI ───────────────────────────────────────────────────────────────────
    function updateUI() {
        // Stats bars
        ['power', 'stamina', 'guts', 'wit'].forEach(s => {
            const val = stats[s];
            const bar  = document.getElementById(`bar-${s}`);
            if (bar) bar.style.width = Math.min(val / 5, 100) + '%';
            const rank = document.getElementById(`rank-${s}`);
            if (rank) rank.innerText = ['F','E','D','C','B','A','S'][Math.floor(Math.min(val / 100, 6))];
        });

        // Task list
        const h          = new Date().getHours();
        const today      = new Date().toDateString();
        const currentDay = new Date().getDay();
        const container  = document.getElementById('task-list');
        container.innerHTML = '';

        const allTasks  = [...coreTasks, ...customTasks];
        let visibleCount = 0;

        allTasks.forEach(task => {
            const taskDays = task.days || [0,1,2,3,4,5,6];
            if (
                taskDays.includes(currentDay) &&
                task.check(h) &&
                history[task.id]  !== today &&
                dismissed[task.id] !== today
            ) {
                visibleCount++;
                const dismissBtn = task.isEssential
                    ? ''
                    : `<button class="btn-dismiss" onclick="dismiss('${task.id}')">Dismiss</button>`;
                container.innerHTML += `
                    <div class="task-item">
                        <div class="task-info" onclick="if(window.showEmotion)window.showEmotion('question',1500); say('Don\'t forget to ${task.name.toLowerCase()}! ${task.timeLabel}')">
                            <span class="task-name" style="text-decoration: underline; cursor: pointer;">${task.name}</span>
                            <div class="task-meta">
                                <span class="task-stat">${task.type.toUpperCase()}</span>
                                <span class="task-time">${task.timeLabel || 'Anytime'}</span>
                            </div>
                        </div>
                        <div class="btn-group">
                            ${dismissBtn}
                            <button class="btn-check" onclick="complete('${task.id}', '${task.anim || 'cheer'}', '${task.type}')">Done</button>
                        </div>
                    </div>`;
            }
        });

        if (visibleCount === 0) {
            container.innerHTML = `<div class="all-done">🌸 All done for today! Great job!</div>`;
        }
    }

    function complete(id, anim, type) {
        const rankBefore = Math.floor(Math.min((stats[type] || 0) / 100, 6));
        history[id] = new Date().toDateString();
        stats[type] = (stats[type] || 0) + 10;
        const rankAfter = Math.floor(Math.min(stats[type] / 100, 6));
        localStorage.setItem('agnesHistory', JSON.stringify(history));
        localStorage.setItem('agnesStats',   JSON.stringify(stats));
        if (agnes) agnes.play(anim);
        if (rankAfter > rankBefore) {
            setStatus(rankUpMessages[type] || '✨ Level up!', 5000);
            if (window.showEmotion) window.showEmotion('bulb', 2500);
        } else {
            setStatus('Good work! 🌸', 3000);
            if (window.showEmotion) window.showEmotion('heart', 1800);
        }
        updateUI();
    }

    function dismiss(id) {
        dismissed[id] = new Date().toDateString();
        localStorage.setItem('agnesDismissed', JSON.stringify(dismissed));
        updateUI();
    }

    // ── Status box ───────────────────────────────────────────────────────────
    let statusTimeout = null;
    let boredTimeout  = null;
    let lastActivity  = Date.now();

    const defaultMessages = [
        "Agnes is here! 🌸",
        "Ready for today?",
        "What's on the schedule?",
    ];

    const boredMessages = [
        "Agnes is bored... 😴",
        "Hmm... nothing to do?",
        "Agnes is waiting patiently...",
        "Is anyone there...? 🌸",
    ];

    const rankUpMessages = {
        power:   "Agnes feels Stronger! 💪",
        stamina: "Agnes has more energy! ✨",
        guts:    "Agnes is tougher now! 🔥",
        wit:     "Agnes feels Smarter! 📚",
    };

    function setStatus(text, duration) {
        const el = document.getElementById('status-text');
        if (!el) return;
        el.style.opacity = '0';
        if (statusTimeout) clearTimeout(statusTimeout);
        setTimeout(() => {
            el.textContent = text;
            el.style.opacity = '1';
        }, 300);
        if (duration) {
            statusTimeout = setTimeout(() => {
                setStatus(defaultMessages[Math.floor(Math.random() * defaultMessages.length)], 0);
            }, duration);
        }
        resetBoredTimer();
    }

    function resetBoredTimer() {
        lastActivity = Date.now();
        if (boredTimeout) clearTimeout(boredTimeout);
        boredTimeout = setTimeout(() => {
            const h = new Date().getHours();
            const msg = boredMessages[Math.floor(Math.random() * boredMessages.length)];
            setStatus(msg, 0);
            // Show zzz late at night, dizzy otherwise
            if (window.showEmotion) window.showEmotion(h >= 22 || h < 6 ? 'zzz' : 'dizzy', 2500);
            boredTimeout = setInterval(() => {
                const m = boredMessages[Math.floor(Math.random() * boredMessages.length)];
                setStatus(m, 0);
                if (window.showEmotion) window.showEmotion('zzz', 2000);
            }, 120000);
        }, 300000);
    }

    function say(text) {
        setStatus(text, 4000);
        if (agnes) agnes.play('say');
        // NOTE: emotion bubble is triggered by the caller, not here, to avoid duplicates
    }

    resetBoredTimer(); // start the inactivity clock on load

    // ── Clock ────────────────────────────────────────────────────────────────
    function updateClock() {
        const now = new Date();
        const timeString = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        const el = document.getElementById('clock');
        if (el) el.innerText = timeString;
    }

    updateClock();
    setInterval(updateClock, 1000);
    setInterval(() => { updateClock(); updateUI(); }, 60000);

    // Run updateUI immediately on page load (doesn't need Phaser)
    updateUI();

    // ── Phaser ───────────────────────────────────────────────────────────────
    const phaserConfig = {
        type: Phaser.AUTO,
        width: 360,
        height: 180,
        transparent: true,
        parent: 'game-container',
        scene: { preload, create }
    };

    // Only boot Phaser once the DOM is ready (it already is at this point,
    // but wrapping in a short defer keeps things safe if the script is moved).
    const game = new Phaser.Game(phaserConfig);

    function preload() {
        this.load.atlas('agnes', 'agnes-sprites.png', 'agnes-sprites-json.json');
        // emotions.png: 8 cols x 10 rows, each cell 32x48px
        this.load.spritesheet('emotions', 'emotions.png', { frameWidth: 32, frameHeight: 48 });
    }

    function create() {
        agnes = this.add.sprite(180, 90, 'agnes', 'agtc001A_00').setScale(1.5).setInteractive();

        // ── Emotion bubble sprite (floats above Agnes) ────────────────────────
        // emotions.png: 8 cols x 10 rows, 32x48px per cell
        // We only use col 0 (first frame) through col 7 (last frame) per row
        // Row order: 0=exclaim, 1=question, 2=music, 3=heart, 4=sweat,
        //            5=sweat2, 6=dizzy, 7=ellipsis, 8=bulb, 9=zzz
        const emo = this.add.sprite(180, 40, 'emotions', 0).setScale(1.2).setAlpha(0).setDepth(10);

        const EMO_ROWS = { exclaim:0, question:1, music:2, heart:3, sweat:4, sweat2:5, dizzy:6, ellipsis:7, bulb:8, zzz:9 };
        Object.entries(EMO_ROWS).forEach(([key, row]) => {
            this.anims.create({
                key: 'emo_' + key,
                frames: this.anims.generateFrameNumbers('emotions', { start: row * 8, end: row * 8 + 7 }),
                frameRate: 8,
                repeat: 0
            });
        });

        let emoTimer = null;
        const showEmotion = (key, durationMs = 1500) => {
            if (emoTimer) { emoTimer.remove(false); emoTimer = null; }
            emo.setPosition(agnes.x, agnes.y - 50);
            emo.setAlpha(1);
            emo.play('emo_' + key);
            emoTimer = this.time.delayedCall(durationMs, () => {
                this.tweens.add({ targets: emo, alpha: 0, duration: 400 });
            });
        };

        window.showEmotion = showEmotion;

        // Track Agnes's position
        this.events.on('update', () => {
            if (emo.alpha > 0) emo.setPosition(agnes.x, agnes.y - 50);
        });

        // ── Animations ───────────────────────────────────────────────────────
        this.anims.create({ key: 'idle1',       frames: [{ key: 'agnes', frame: 'agtc001A_00' }, { key: 'agnes', frame: 'agtc001A_01' }, { key: 'agnes', frame: 'agtc100_00' }, { key: 'agnes', frame: 'agtc100_01' }, { key: 'agnes', frame: 'agtc100_02' }, { key: 'agnes', frame: 'agtc100_03' }], frameRate: 2, repeat: -1 });
        this.anims.create({ key: 'eating',      frames: ['agtc360_06','agtc360_07','agtc360_08','agtc360_09','agtc360_08','agtc360_09','agtc360_08','agtc360_09','agtc360_08','agtc360_09','agtc360_10','agtc360_11','agtc360_12'].map(f=>({key:'agnes',frame:f})), frameRate: 4, repeat: 0 });
        this.anims.create({ key: 'walk_left',   frames: [{ key: 'agnes', frame: 'agtc101_00' }, { key: 'agnes', frame: 'agtc101_01' }, { key: 'agnes', frame: 'agtc101_02' }, { key: 'agnes', frame: 'agtc101_03' }, { key: 'agnes', frame: 'agtc101_04' }, { key: 'agnes', frame: 'agtc101_05' }], frameRate: 6, repeat: -1 });
        this.anims.create({ key: 'sit_down',    frames: [{ key: 'agnes', frame: 'agtc320_00' }, { key: 'agnes', frame: 'agtc320_01' }, { key: 'agnes', frame: 'agtc320_02' }, { key: 'agnes', frame: 'agtc320_03' }, { key: 'agnes', frame: 'agtc320_04' }, { key: 'agnes', frame: 'agtc320_06' }], frameRate: 6, repeat: 0 });
        this.anims.create({ key: 'dash',        frames: ['agtc102_00','agtc102_01','agtc102_02','agtc102_03','agtc102_04','agtc102_05'].map(f=>({key:'agnes',frame:f})), frameRate: 10, repeat: -1 });
        this.anims.create({ key: 'super_dash',  frames: ['agtc110_00','agtc110_01','agtc111_00','agtc111_01','agtc111_02','agtc111_03','agtc111_04','agtc111_05','agtc111_06','agtc112_00','agtc112_01','agtc113_00','agtc113_01'].map(f=>({key:'agnes',frame:f})), frameRate: 12, repeat: 0 });
        this.anims.create({ key: 'sudden_stop', frames: [{ key: 'agnes', frame: 'agtc120_00' }, { key: 'agnes', frame: 'agtc120_01' }], frameRate: 6, repeat: 0 });
        this.anims.create({ key: 'float',       frames: [{ key: 'agnes', frame: 'agtc362_00' }, { key: 'agnes', frame: 'agtc362_01' }], frameRate: 4, repeat: -1 });
        this.anims.create({ key: 'giggle',      frames: ['agtc500_00','agtc500_01','agtc500_02','agtc500_03'].map(f=>({key:'agnes',frame:f})), frameRate: 6, repeat: 0 });
        this.anims.create({ key: 'snack',       frames: ['agtc510_00','agtc510_01','agtc510_02','agtc510_03','agtc510_04','agtc510_05'].map(f=>({key:'agnes',frame:f})), frameRate: 4, repeat: 0 });
        this.anims.create({ key: 'wave',        frames: [{ key: 'agnes', frame: 'agtc540_00' }, { key: 'agnes', frame: 'agtc540_01' }], frameRate: 4, repeat: 5 });
        this.anims.create({ key: 'cheer',       frames: ['agtc602_00','agtc602_01','agtc602_02'].map(f=>({key:'agnes',frame:f})), frameRate: 4, repeat: 3 });
        this.anims.create({ key: 'say',         frames: ['agtc730_00','agtc730_01','agtc730_02','agtc730_03'].map(f=>({key:'agnes',frame:f})), frameRate: 4, repeat: 0 });

        // ── Movement state ────────────────────────────────────────────────────
        let agnesVX = 0;
        let agnesVY = 0;
        let moveMode = 'none';
        let floatAngle = 0;
        let wallBouncing = false;

        const scene = this;
        const HOME_X = 180;
        const HOME_Y = 90;

          const idleQuotes = [
            "Life is an experiment, and we its guinea pigs.",
            "Don't worry about it~",
            "The worst that could happen is your legs would start glowing green for a while!",
            "Isn't that a cute side effect?",
            "Witness me. Watch me run. Burn the sight into your eyes.",
            "Time for science!",
            "Want to be my test subject next?",
            "lets run together next time!",
        ];
        let lastQuoteIndex = -1;
        const maybeQuote = () => {
            if (Math.random() < 0.2) {
                let idx;
                do { idx = Math.floor(Math.random() * idleQuotes.length); } while (idx === lastQuoteIndex);
                lastQuoteIndex = idx;
                setStatus(idleQuotes[idx], 5000);
                showEmotion('ellipsis', 2000);
            }
        };

        const weightedPool = [
            'idle1','idle1','idle1','idle1','idle1','idle1',
            'walk_left', 'dash', 'super_dash', 'float', 'giggle', 'wave', 'cheer'
        ];

        let idleTimer = null;
        const scheduleNext = (delayMs) => {
            if (idleTimer) idleTimer.remove(false);
            idleTimer = scene.time.delayedCall(delayMs, playRandomIdle);
        };

        const scheduleNextQuote = () => {
            scene.time.delayedCall(Phaser.Math.Between(25000, 45000), () => {
                maybeQuote();
                scheduleNextQuote();
            });
        };
        scheduleNextQuote();

        const stopMoving = () => {
            agnesVX = 0;
            agnesVY = 0;
            moveMode = 'none';
            wallBouncing = false;
        };

        const parkIdle = () => {
            stopMoving();
            agnes.setFlipX(false);
            agnes.play('idle1');
        };

        // Walk Agnes back to HOME_X using walk animation, then call onArrival
        const walkHome = (onArrival) => {
            if (Math.abs(agnes.x - HOME_X) < 10) {
                agnes.x = HOME_X;
                agnes.y = HOME_Y;
                onArrival();
                return;
            }
            const goRight = agnes.x < HOME_X;
            agnes.setFlipX(goRight);
            agnesVX = goRight ? 60 : -60;
            moveMode = 'returning';
            agnes.play('walk_left');
            // Check arrival each frame via update(); onArrival stored for update() to call
            scene._walkHomeCallback = onArrival;
        };

        const playRandomIdle = () => {
            const key = weightedPool[Math.floor(Math.random() * weightedPool.length)];
            stopMoving();

            if (key === 'walk_left') {
                // Pick a random direction, walk, optionally flip and walk back
                const goRight = Math.random() > 0.5;
                agnes.setFlipX(goRight);
                agnesVX = goRight ? 50 : -50;
                moveMode = 'walk';
                agnes.play('walk_left');
                // After 2–4 s, flip and walk back to home
                scene.time.delayedCall(Phaser.Math.Between(2000, 4000), () => {
                    if (moveMode === 'walk') {
                        stopMoving();
                        walkHome(() => {
                            parkIdle();
                            scheduleNext(Phaser.Math.Between(2000, 4000));
                        });
                    }
                });

            } else if (key === 'dash') {
                const goRight = Math.random() > 0.5;
                agnes.setFlipX(goRight);
                agnesVX = goRight ? 160 : -160;
                moveMode = 'dash';
                agnes.play('dash');
                // After 1–2 s flip and dash back home
                scene.time.delayedCall(Phaser.Math.Between(1000, 2000), () => {
                    if (moveMode === 'dash') {
                        stopMoving();
                        // Dash back at half speed so she doesn't overshoot
                        const backRight = agnes.x < HOME_X;
                        agnes.setFlipX(backRight);
                        agnesVX = backRight ? 140 : -140;
                        moveMode = 'dash_return';
                        agnes.play('dash');
                    }
                });

            } else if (key === 'super_dash') {
                const goRight = Math.random() > 0.5;
                agnes.setFlipX(goRight);
                agnesVX = goRight ? 220 : -220;
                moveMode = 'superdash';
                agnes.play('super_dash');

            } else if (key === 'float') {
                // Float sporadically for 5–9 seconds with varying drift
                floatAngle = Math.random() * Math.PI * 2; // random start phase
                moveMode = 'float';
                agnes.play('float');
                const floatDuration = Phaser.Math.Between(5000, 9000);
                scene.time.delayedCall(floatDuration, () => {
                    if (moveMode === 'float') {
                        // Walk home after floating
                        stopMoving();
                        walkHome(() => {
                            parkIdle();
                            scheduleNext(Phaser.Math.Between(3000, 6000));
                        });
                    }
                });

            } else if (key === 'idle1') {
                agnes.setPosition(HOME_X, HOME_Y);
                agnes.setFlipX(false);
                agnes.play('idle1');
                scheduleNext(Phaser.Math.Between(4000, 8000));

            } else {
                // giggle, wave, cheer — in place
                agnes.setFlipX(false);
                agnes.play(key);
                if (key === 'cheer' || key === 'wave') showEmotion('music', 1500);
            }
        };

        agnes.on('animationcomplete', (anim) => {
            if (anim.key === 'super_dash') {
                stopMoving();
                // Walk back home after super dash
                walkHome(() => {
                    parkIdle();
                    scheduleNext(Phaser.Math.Between(3000, 6000));
                });
            } else if (anim.key === 'sudden_stop') {
                parkIdle();
                scheduleNext(Phaser.Math.Between(3000, 6000));
            } else if (anim.key === 'say' || anim.key === 'cheer') {
                parkIdle();
                scheduleNext(500);
            } else if (anim.key === 'walk_left' || anim.key === 'dash') {
                // looping — handled externally
            } else if (anim.key === 'idle1') {
                // looping — never completes
            } else {
                parkIdle();
                scheduleNext(Phaser.Math.Between(3000, 6000));
            }
        });

        agnes.on('pointerdown', () => {
            if (idleTimer) idleTimer.remove(false);
            scene._walkHomeCallback = null;
            parkIdle();
            agnes.setPosition(HOME_X, HOME_Y);
            showEmotion('question', 1800);
            say('Hi! Don\'t forget your tasks today! 🌸');
            scheduleNext(3000);
        });

        scheduleNext(1000);

        // ── update() ─────────────────────────────────────────────────────────
        scene.events.on('update', (time, delta) => {
            if (!agnes) return;
            const dt = delta / 1000;

            if (moveMode === 'float') {
                // Sporadic drift — two sine waves at different speeds for organic feel
                floatAngle += delta * 0.0008;
                agnes.x = HOME_X + Math.sin(floatAngle * 1.3) * 70 + Math.sin(floatAngle * 2.7) * 20;
                agnes.y = HOME_Y + Math.sin(floatAngle * 0.9) * 18 + Math.sin(floatAngle * 2.1) * 8;
                return;
            }

            if (agnesVX === 0 && agnesVY === 0) return;

            agnes.x += agnesVX * dt;
            agnes.y += agnesVY * dt;

            // Arrival check for walkHome
            if (moveMode === 'returning' && scene._walkHomeCallback) {
                const arrived = (agnesVX > 0 && agnes.x >= HOME_X) || (agnesVX < 0 && agnes.x <= HOME_X);
                if (arrived) {
                    agnes.x = HOME_X;
                    agnes.y = HOME_Y;
                    const cb = scene._walkHomeCallback;
                    scene._walkHomeCallback = null;
                    stopMoving();
                    cb();
                    return;
                }
            }

            // Arrival check for dash_return
            if (moveMode === 'dash_return') {
                const arrived = (agnesVX > 0 && agnes.x >= HOME_X) || (agnesVX < 0 && agnes.x <= HOME_X);
                if (arrived) {
                    agnes.x = HOME_X;
                    parkIdle();
                    scheduleNext(Phaser.Math.Between(2000, 4000));
                    return;
                }
            }

            const hitLeft  = agnes.x < 20;
            const hitRight = agnes.x > 340;

            if (moveMode === 'walk' && (hitLeft || hitRight) && !wallBouncing) {
                wallBouncing = true;
                // Flip and walk back instead of stopping dead
                agnesVX *= -1;
                agnes.setFlipX(agnesVX > 0);
            } else if (moveMode === 'dash' && (hitLeft || hitRight) && !wallBouncing) {
                wallBouncing = true;
                parkIdle();
                scheduleNext(Phaser.Math.Between(2000, 4000));
            } else if (moveMode === 'dash_return' && (hitLeft || hitRight)) {
                parkIdle();
                scheduleNext(Phaser.Math.Between(2000, 4000));
            } else if (moveMode === 'superdash' && (agnes.x < 10 || agnes.x > 350)) {
                agnesVX = 0;
                agnesVY = 0;
                moveMode = 'none';
            }
        });
    }
</script>
