<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        :root { --accent: #f8a5c2; --bg: #fff0f5; --bar-bg: #dfe6e9; --dismiss: #b2bec3; }
        body { background: var(--bg); display: flex; flex-direction: column; align-items: center; font-family: 'Segoe UI', sans-serif; color: #596275; margin: 0; padding: 20px; }
        
        #hud { width: 320px; background: white; padding: 15px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .stat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .stat-label { width: 40px; font-weight: bold; font-size: 0.8em; }
        .bar-container { flex-grow: 1; height: 10px; background: var(--bar-bg); border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.5s; }
        .rank { width: 25px; font-weight: bold; font-size: 0.9em; text-align: center; color: var(--accent); }

        #game-container { border: 8px solid #fff; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: #fff; width: 200px; height: 200px; overflow: hidden; margin-bottom: 20px; position: relative; }
        
        #checklist { width: 320px; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .task-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .task-info { display: flex; flex-direction: column; }
        .task-name { font-weight: 600; font-size: 0.85em; }
        .task-meta { display: flex; gap: 8px; }
        .task-stat { font-size: 0.7em; color: #a5b1c2; font-weight: bold; }
        .task-time { font-size: 0.7em; color: var(--accent); font-weight: bold; }
        .btn-group { display: flex; gap: 5px; }
        .btn-check { background: var(--accent); color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-dismiss { background: var(--dismiss); color: white; border: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 0.7em; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stat-row"><div class="stat-label">Pwr</div><div class="bar-container"><div id="bar-power" class="bar-fill"></div></div><div id="rank-power" class="rank">F</div></div>
        <div class="stat-row"><div class="stat-label">Stm</div><div class="bar-container"><div id="bar-stamina" class="bar-fill"></div></div><div id="rank-stamina" class="rank">F</div></div>
        <div class="stat-row"><div class="stat-label">Gts</div><div class="bar-container"><div id="bar-guts" class="bar-fill"></div></div><div id="rank-guts" class="rank">F</div></div>
        <div class="stat-row"><div class="stat-label">Wit</div><div class="bar-container"><div id="bar-wit" class="bar-fill"></div></div><div id="rank-wit" class="rank">F</div></div>
    </div>

    <div id="game-container"></div>
    
    <div id="checklist">
        <h3 style="margin-top:0;">Today's Schedule</h3>
        <div id="task-list"></div>
    </div>

<script>
    let agnes, sceneContext;
    let stats = JSON.parse(localStorage.getItem('agnesStats')) || { power: 0, stamina: 0, guts: 0, wit: 0 };
    let history = JSON.parse(localStorage.getItem('agnesHistory')) || {}; // { taskId: date }
    let dismissed = JSON.parse(localStorage.getItem('agnesDismissed')) || {}; // { taskId: date }
    let lastInteraction = Date.now();

    const tasks = [
        { id: 'Breakfast', name: 'Have Breakfast', type: 'power', anim: 'eating', timeLabel: 'Until 12PM', isEssential: true, check: h => h < 12 },
        { id: 'Lunch', name: 'Eat Lunch', type: 'power', anim: 'eating', timeLabel: '12PM - 3PM', isEssential: true, check: h => h >= 12 && h < 15 },
        { id: 'Dinner', name: 'Have Dinner', type: 'power', anim: 'eating', timeLabel: '3PM - 10PM', isEssential: true, check: h => h >= 15 && h < 22 },
        { id: 'Water', name: 'Drink Water', type: 'stamina', anim: 'walk_left', timeLabel: 'Every 2hrs', isEssential: true, check: h => h >= 8 && h < 24 && h % 2 === 0 },
        { id: 'Snack', name: 'Have a Snack', type: 'stamina', anim: 'eating', timeLabel: 'Every 4hrs', isEssential: true, check: h => h >= 8 && h < 24 && h % 4 === 0 },
        { id: 'Teeth', name: 'Clean Teeth', type: 'guts', anim: 'sit_down', timeLabel: 'Until 9AM', isEssential: true, check: h => h < 9 },
        { id: 'Tidy', name: 'Tidy Up Room', type: 'wit', anim: 'walk_left', timeLabel: 'Anytime', isEssential: false, check: h => h >= 8 && h < 22 },
        { id: 'Study', name: 'Study 30 Mins', type: 'wit', anim: 'sit_down', timeLabel: 'Afternoon', isEssential: false, check: h => h >= 12 && h < 18 }
    ];

    function updateUI() {
        ['power', 'stamina', 'guts', 'wit'].forEach(s => {
            const val = stats[s];
            document.getElementById(`bar-${s}`).style.width = Math.min(val / 5, 100) + '%';
            document.getElementById(`rank-${s}`).innerText = ['F','E','D','C','B','A','S'][Math.floor(Math.min(val/100, 6))];
        });

        const h = new Date().getHours();
        const today = new Date().toDateString();
        const container = document.getElementById('task-list');
        container.innerHTML = '';
        
        tasks.forEach(task => {
            // Only show if it's currently "valid" (check), not completed today, AND not dismissed today
            if (task.check(h) && history[task.id] !== today && dismissed[task.id] !== today) {
                let dismissBtn = task.isEssential ? '' : `<button class="btn-dismiss" onclick="dismiss('${task.id}')">Dismiss</button>`;
                container.innerHTML += `
                    <div class="task-item">
                        <div class="task-info">
                            <span class="task-name">${task.name}</span>
                            <div class="task-meta">
                                <span class="task-stat">${task.type.toUpperCase()}</span>
                                <span class="task-time">${task.timeLabel}</span>
                            </div>
                        </div>
                        <div class="btn-group">
                            ${dismissBtn}
                            <button class="btn-check" onclick="complete('${task.id}', '${task.anim}', '${task.type}')">Done</button>
                        </div>
                    </div>`;
            }
        });
    }

    function complete(id, anim, type) {
        lastInteraction = Date.now();
        history[id] = new Date().toDateString();
        stats[type] += 10;
        localStorage.setItem('agnesHistory', JSON.stringify(history));
        localStorage.setItem('agnesStats', JSON.stringify(stats));
        agnes.play(anim);
        updateUI();
    }

    function dismiss(id) {
        dismissed[id] = new Date().toDateString();
        localStorage.setItem('agnesDismissed', JSON.stringify(dismissed));
        updateUI();
    }

    // --- GAME ENGINE ---
    const config = { type: Phaser.AUTO, width: 200, height: 200, parent: 'game-container', scene: { preload: preload, create: create } };
    new Phaser.Game(config);

    function preload() { this.load.atlas('agnes', 'agnes-sprites.png', 'agnes-sprites-json.json'); }
    function create() {
        sceneContext = this;
        agnes = this.add.sprite(100, 100, 'agnes', 'agtc001A_00.png').setScale(1.5);
        
        this.anims.create({ key: 'idle1', frames: [{ key: 'agnes', frame: 'agtc001A_00.png' }, { key: 'agnes', frame: 'agtc001A_01.png' }], frameRate: 2, repeat: 1 });
        this.anims.create({ key: 'idle2', frames: [{ key: 'agnes', frame: 'agtc001A_01.png' }, { key: 'agnes', frame: 'agtc001A_02.png' }], frameRate: 2, repeat: 1 });
        this.anims.create({ key: 'walk_random', frames: [{ key: 'agnes', frame: 'agtc101_00.png' }, { key: 'agnes', frame: 'agtc101_02.png' }], frameRate: 4, repeat: 3 });
        this.anims.create({ key: 'eating', frames: [{ key: 'agnes', frame: 'agtc360_06.png' }, { key: 'agnes', frame: 'agtc360_07.png' }, { key: 'agnes', frame: 'agtc360_08.png' }, { key: 'agnes', frame: 'agtc360_09.png' }, { key: 'agnes', frame: 'agtc360_10.png' }, { key: 'agnes', frame: 'agtc360_11.png' }, { key: 'agnes', frame: 'agtc360_12.png' }], frameRate: 6, repeat: 0 });
        this.anims.create({ key: 'walk_left', frames: [{ key: 'agnes', frame: 'agtc101_00.png' }], frameRate: 6, repeat: 0 });
        this.anims.create({ key: 'sit_down', frames: [{ key: 'agnes', frame: 'agtc320_00.png' }, { key: 'agnes', frame: 'agtc320_04.png' }], frameRate: 6, repeat: 0 });
        this.anims.create({ key: 'victory', frames: [{ key: 'agnes', frame: 'agtc940_00.png' }, { key: 'agnes', frame: 'agtc940_03.png' }], frameRate: 8, repeat: 2 });

        agnes.on('animationcomplete', (a) => {
            if (a.key === 'victory') agnes.play('idle1');
            else if (['eating', 'walk_left', 'sit_down'].includes(a.key)) agnes.play('victory');
            else {
                const behaviors = ['idle1', 'idle2', 'walk_random'];
                const choice = behaviors[Math.floor(Math.random() * behaviors.length)];
                if (choice === 'walk_random') {
                    const targetX = Math.random() > 0.5 ? 40 : 160;
                    agnes.flipX = (targetX > agnes.x);
                    sceneContext.tweens.add({ targets: agnes, x: targetX, duration: 1500, ease: 'Linear' });
                }
                agnes.play(choice);
            }
        });

        setInterval(() => {
            if ((Date.now() - lastInteraction) / 60000 >= 15 && agnes.anims.currentAnim.key !== 'sit_down') agnes.play('sit_down');
        }, 10000);

        agnes.play('idle1');
        updateUI();
        setInterval(updateUI, 60000);
    }
</script>
</body>
</html>
